name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env: { ACCEPT_EULA: Y, MSSQL_SA_PASSWORD: "StrongPass!12345" }
        ports: ["1433:1433"]
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'StrongPass!12345' -C -Q 'SELECT 1'"
          --health-interval 10s --health-timeout 5s --health-retries 20
    env:
      CATWORLD_DATABASE_URL: "sqlserver://localhost:1433;database=catworld;user=sa;password=StrongPass!12345;encrypt=true;trustServerCertificate=true"
      CATWORLD_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      AUTH_SECRET: "ci-auth-secret-with-more-than-thirty-two-bytes"
      AUTH_URL: "http://127.0.0.1:3000"
      CATWORLD_UPLOAD_DIR: "./var/uploads"
      CATWORLD_ADMIN_EMAIL: admin@example.com
      CATWORLD_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run check:encoding
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/create-database.mjs
      - run: npx prisma migrate deploy
      - run: npm run seed
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e